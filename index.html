<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a6fd4">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>BlueChatX</title>
  <link rel="icon" type="image/png" href="icon.png?v=20260713">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f6fd; overflow: hidden; }
    .screen { position: fixed; inset: 0; display: flex; flex-direction: column; z-index: 1; background: #f0f6fd; }
    .screen.active { z-index: 10; }
    .hidden { display: none !important; }
    .onboarding-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }
    .logo-large { text-align: center; margin-bottom: 48px; }
    .logo-icon { font-size: 64px; margin-bottom: 16px; }
    .logo-large h1 { font-size: 32px; font-weight: 700; color: #1a6fd4; }
    .tagline { color: #8b95a5; margin-top: 8px; font-size: 14px; }
    .onboarding-form { width: 100%; max-width: 400px; }
    input { width: 100%; height: 52px; padding: 0 16px; border: 2px solid #e8ecf1; border-radius: 12px; font-size: 16px; margin-bottom: 12px; }
    input:focus { outline: none; border-color: #1a6fd4; }
    button { width: 100%; height: 52px; background: linear-gradient(135deg, #1a6fd4, #0d4a8f); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
    button:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(26, 111, 212, 0.18); }
  </style>
</head>
<body>
  <div id="screen-onboarding" class="screen active">
    <div class="onboarding-container">
      <div class="logo-large">
        <div class="logo-icon">💬</div>
        <h1>BlueChatX</h1>
        <p class="tagline">シンプルなチャットアプリ</p>
      </div>
      <div class="onboarding-form">
        <input type="text" id="input-name" placeholder="名前を入力" />
        <button id="btn-start">はじめる</button>
      </div>
    </div>
  </div>
  <div id="screen-main" class="screen hidden">
    <div style="padding: 24px; text-align: center;">
      <h2>準備中...</h2>
      <p>アプリを読み込んでいます</p>
    </div>
  </div>
  <div id="toast" class="hidden" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a6fd4; color: white; padding: 12px 24px; border-radius: 8px; z-index: 1000;"></div>

  <script>
    function initApp() {
      const btnStart = document.getElementById('btn-start');
      const inputName = document.getElementById('input-name');
      
      btnStart?.addEventListener('click', function() {
        const name = (inputName?.value || '').trim();
        if (!name) {
          showToast('名前を入力してください');
          return;
        }
        createUser(name);
      });

      inputName?.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') btnStart?.click();
      });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      if (toast) {
        toast.textContent = msg;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 2500);
      }
    }

    function createUser(name) {
      const userId = 'user_' + Date.now().toString(36);
      const data = {
        currentUserId: userId,
        users: {
          [userId]: { id: userId, name: name, createdAt: Date.now() }
        },
        friendships: [],
        conversations: {},
        messages: {}
      };
      localStorage.setItem('bluechat_data', JSON.stringify(data));
      showToast('ようこそ、' + name + 'さん！');
      setTimeout(() => {
        document.getElementById('screen-onboarding').classList.add('hidden');
        document.getElementById('screen-main').classList.remove('hidden');
      }, 1000);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }
  </script>
</body>
</html>
