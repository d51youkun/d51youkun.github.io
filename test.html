<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>カイリュー フライト！</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #0a0a1a;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
overflow: hidden;
font-family: ‘Press Start 2P’, monospace;
touch-action: none;
user-select: none;
}

#gameWrapper {
position: relative;
width: min(100vw, 177.78vh);
height: min(56.25vw, 100vh);
border-radius: 12px;
overflow: hidden;
box-shadow: 0 0 60px #f8a030aa, 0 0 120px #4488ffaa;
border: 2px solid #f8a030;
}

#gameCanvas {
display: block;
width: 100%;
height: 100%;
}

@media (orientation: portrait) {
#gameWrapper {
transform: rotate(90deg);
width: min(100vh, 177.78vw);
height: min(56.25vh, 100vw);
}
}

#ui {
position: absolute;
top: 0; left: 0; right: 0;
pointer-events: none;
padding: 14px 16px;
display: flex;
justify-content: space-between;
align-items: flex-start;
}

#scoreBox {
background: rgba(0,0,0,0.55);
border: 1px solid #f8a030;
border-radius: 8px;
padding: 6px 10px;
color: #f8a030;
font-size: 9px;
line-height: 1.7;
}

#levelBox {
background: rgba(0,0,0,0.55);
border: 1px solid #66aaff;
border-radius: 8px;
padding: 6px 10px;
color: #88ccff;
font-size: 9px;
line-height: 1.7;
text-align: right;
}

#overlay {
position: absolute;
inset: 0;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
background: rgba(5,5,20,0.88);
gap: 18px;
transition: opacity 0.3s;
pointer-events: all;
z-index: 10;
}

#overlay.hidden { display: none; pointer-events: none; }

#overlay h1 {
color: #f8a030;
font-size: 13px;
text-align: center;
line-height: 2;
text-shadow: 0 0 20px #f8a030;
}

#overlay .subtitle {
color: #aaccff;
font-size: 8px;
text-align: center;
line-height: 2;
}

#tapBtn {
background: linear-gradient(135deg, #f8a030, #e06010);
color: #fff;
border: none;
border-radius: 12px;
padding: 14px 28px;
font-family: ‘Press Start 2P’, monospace;
font-size: 10px;
cursor: pointer;
box-shadow: 0 0 20px #f8a03088;
pointer-events: all;
animation: pulse 1.2s ease-in-out infinite;
}

@keyframes pulse {
0%,100% { transform: scale(1); box-shadow: 0 0 20px #f8a03088; }
50% { transform: scale(1.06); box-shadow: 0 0 35px #f8a030cc; }
}

#levelBar {
position: absolute;
bottom: 10px;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 5px;
pointer-events: none;
}

.lvlDot {
width: 8px; height: 8px;
border-radius: 50%;
background: rgba(255,255,255,0.2);
border: 1px solid rgba(255,255,255,0.3);
transition: background 0.3s;
}
.lvlDot.active { background: #f8a030; box-shadow: 0 0 6px #f8a030; }

#hpBar {
position: absolute;
top: 10px;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 6px;
pointer-events: none;
background: rgba(0,0,0,0.45);
border: 1px solid #ff6666;
border-radius: 8px;
padding: 4px 10px;
font-size: 18px;
}
.hp { transition: opacity 0.2s; }
.hp.lost { opacity: 0.15; filter: grayscale(1); }
</style>

</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas" width="800" height="450"></canvas>

  <div id="ui">
    <div id="scoreBox">
      スコア<br><span id="scoreVal">0</span>
    </div>
    <div id="levelBox">
      レベル<br><span id="levelVal">1</span> / 10
    </div>
  </div>
  <div id="hpBar">
    <span class="hp" id="hp0">❤️</span>
    <span class="hp" id="hp1">❤️</span>
    <span class="hp" id="hp2">❤️</span>
  </div>

  <div id="levelBar">
    <div class="lvlDot active" id="d0"></div>
    <div class="lvlDot" id="d1"></div>
    <div class="lvlDot" id="d2"></div>
    <div class="lvlDot" id="d3"></div>
    <div class="lvlDot" id="d4"></div>
    <div class="lvlDot" id="d5"></div>
    <div class="lvlDot" id="d6"></div>
    <div class="lvlDot" id="d7"></div>
    <div class="lvlDot" id="d8"></div>
    <div class="lvlDot" id="d9"></div>
  </div>

  <div id="overlay">
    <h1>カイリュー<br>フライト！</h1>
    <div class="subtitle">タップで飛ぶ！<br>障害物を避けろ！</div>
    <button id="tapBtn">スタート！</button>
  </div>
</div>

// ── ゲーム定数 ──
const GRAVITY = 0.55;
const JUMP_VEL = -9; // unused now
const PIPE_W = 52;
const PIPE_COLOR_TOP = '#1a6e3f';
const PIPE_COLOR_BOT = '#1a6e3f';

// ── 状態 ──
let state = 'idle'; // idle | playing | dead
let isHolding = false;
let score, level, hiScore = 0;
let hp, savedLevel, savedScore;
let bird, pipes, particles, stars, levelLines;
let frameCount, pipeTimer, speed, gapH;

function getLevelConfig(lv) {
  // レベル1-10: スピード・ギャップ
  return {
    speed: 5.5 + (lv - 1) * 0.55,
    gapH: 195 - (lv - 1) * 13, // 195→82
    pipeInterval: Math.max(70, 110 - (lv - 1) * 5)
  };
}

function initGame() {
  score = 0;
  level = 1;
  savedLevel = 1;
  savedScore = 0;
  hp = 3;
  frameCount = 0;
  pipeTimer = 0;
  let cfg = getLevelConfig(level);
  speed = cfg.speed;
  gapH = cfg.gapH;

  bird = {
    x: 120, y: H / 2,
    vy: 0,
    w: 80, h: 70,
    angle: 0,
    flap: 0,
    invincible: 0,
    trail: []
  };

  pipes = [];
  particles = [];
  levelLines = [];
  stars = Array.from({length: 60}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.3,
    brightness: Math.random()
  }));

  updateScoreUI();
  updateLevelUI();
}

function startHold() {
  if (state === 'playing') {
    isHolding = true;
  }
}
function stopHold() {
  isHolding = false;
}

function spawnPipe() {
  const minTop = 50, maxTop = H - gapH - 60;
  const topH = Math.random() * (maxTop - minTop) + minTop;
  pipes.push({
    x: W + 10, topH, scored: false
  });
}

function checkCollision() {
  const bx = bird.x - bird.w * 0.3;
  const by = bird.y - bird.h * 0.3;
  const bw = bird.w * 0.6;
  const bh = bird.h * 0.6;

  // 上下境界
  if (bird.y - bird.h / 2 < 0 || bird.y + bird.h / 2 > H - 30) return true;

  for (let p of pipes) {
    const px = p.x, pw = PIPE_W;
    const gapY = p.topH + gapH;
    if (bx + bw > px && bx < px + pw) {
      if (by < p.topH || by + bh > gapY) return true;
    }
  }
  return false;
}

function updateScoreUI() {
  document.getElementById('scoreVal').textContent = score;
}
function updateHpUI() {
  for (let i = 0; i < 3; i++) {
    document.getElementById('hp' + i).classList.toggle('lost', i >= hp);
  }
}
function updateLevelUI() {
  document.getElementById('levelVal').textContent = level;
  for (let i = 0; i < 10; i++) {
    document.getElementById('d' + i).classList.toggle('active', i < level);
  }
}

// ── 背景描画 ──
function drawBackground() {
  // 夜空グラデーション
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#080820');
  grad.addColorStop(0.6, '#0d1840');
  grad.addColorStop(1, '#1a2040');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 星
  for (let s of stars) {
    const b = 0.4 + 0.6 * Math.abs(Math.sin(frameCount * 0.02 + s.brightness * 10));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${b})`;
    ctx.fill();
  }

  // 地面
  const groundGrad = ctx.createLinearGradient(0, H - 40, 0, H);
  groundGrad.addColorStop(0, '#1a3a1a');
  groundGrad.addColorStop(1, '#0d1f0d');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, H - 30, W, 30);
  // 地面ライン
  ctx.strokeStyle = '#2a5a2a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H - 30); ctx.lineTo(W, H - 30);
  ctx.stroke();
}

// ── パイプ描画 ──
function drawLevelLine(ll) {
  const x = ll.x;
  // グロー縦線
  ctx.save();
  ctx.shadowColor = '#ffdd00';
  ctx.shadowBlur = 18;

  // グラデーション縦線
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0,   'rgba(255,220,0,0)')
  grad.addColorStop(0.1, 'rgba(255,220,0,0.9)');
  grad.addColorStop(0.5, 'rgba(255,255,100,1)');
  grad.addColorStop(0.9, 'rgba(255,220,0,0.9)');
  grad.addColorStop(1,   'rgba(255,220,0,0)');

  ctx.strokeStyle = grad;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, 0);
  ctx.lineTo(x, H);
  ctx.stroke();

  // LEVEL UP テキスト
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#ffee44';
  ctx.font = 'bold 11px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL ' + ll.lv, x, 30);
  ctx.restore();
}

function drawPipe(p) {
  const gapY = p.topH + gapH;
  const capH = 20, capW = PIPE_W + 8, capX = p.x - 4;

  // 上パイプ
  const pg1 = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  pg1.addColorStop(0, '#1a8050');
  pg1.addColorStop(0.5, '#2aaa60');
  pg1.addColorStop(1, '#0e4030');
  ctx.fillStyle = pg1;
  ctx.fillRect(p.x, 0, PIPE_W, p.topH - capH);
  // 上キャップ
  ctx.fillStyle = '#2aaa60';
  ctx.fillRect(capX, p.topH - capH, capW, capH);
  ctx.strokeStyle = '#0e4030';
  ctx.lineWidth = 2;
  ctx.strokeRect(capX, p.topH - capH, capW, capH);

  // 下パイプ
  const pg2 = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
  pg2.addColorStop(0, '#1a8050');
  pg2.addColorStop(0.5, '#2aaa60');
  pg2.addColorStop(1, '#0e4030');
  ctx.fillStyle = pg2;
  ctx.fillRect(p.x, gapY + capH, PIPE_W, H - gapY - capH);
  // 下キャップ
  ctx.fillStyle = '#2aaa60';
  ctx.fillRect(capX, gapY, capW, capH);
  ctx.strokeStyle = '#0e4030';
  ctx.strokeRect(capX, gapY, capW, capH);
}

// ── カイリュー描画 ──
function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(Math.max(-0.4, Math.min(0.6, bird.vy * 0.04)));

  // 点滅(無敵時)
  if (bird.invincible > 0 && Math.floor(bird.invincible / 4) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  const bw = bird.w, bh = bird.h;

  // 高画質レンダリング設定
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  // オーラ(グロー効果)
  ctx.shadowColor = '#f8a030';
  ctx.shadowBlur = 18;

  // 少し大きめに描画してシャープに
  ctx.drawImage(dragonImg, -bw / 2, -bh / 2, bw, bh);

  // シャドウリセット
  ctx.shadowBlur = 0;

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── パーティクル描画 ──
function drawParticles() {
  for (let p of particles) {
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── スコア表示 ──
function drawScore() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.font = '10px "Press Start 2P"';
}

// ── ゲームオーバー画面 ──
function showOverlay(type) {
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  const h1 = ov.querySelector('h1');
  const sub = ov.querySelector('.subtitle');
  const btn = document.getElementById('tapBtn');
  if (type === 'dead') {
    h1.innerHTML = 'ゲームオーバー！';
    h1.style.color = '#ff5555';
    h1.style.textShadow = '0 0 20px #ff5555';
    sub.innerHTML = `スコア: ${score}<br>ハイスコア: ${hiScore}<br>到達レベル: ${level}`;
    btn.textContent = 'もういちど！';
  } else {
    h1.innerHTML = 'カイリュー<br>フライト！';
    h1.style.color = '#f8a030';
    h1.style.textShadow = '0 0 20px #f8a030';
    sub.innerHTML = 'タップで飛ぶ！<br>障害物を避けろ！';
    btn.textContent = 'スタート！';
  }
}

// ── メインループ ──
function gameLoop() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (state === 'playing') {
    frameCount++;
    pipeTimer++;

    let cfg = getLevelConfig(level);

    // パイプスポーン
    if (pipeTimer >= cfg.pipeInterval) {
      spawnPipe();
      pipeTimer = 0;
    }

    // 鳥の物理 (ホールドで上昇)
    if (isHolding) {
      bird.vy += -1.1; // 上昇加速
      bird.vy = Math.max(bird.vy, -7); // 上限速度
    } else {
      bird.vy += GRAVITY; // 落下
    }
    bird.vy = Math.min(bird.vy, 10); // 落下上限
    bird.y += bird.vy;
    if (bird.invincible > 0) bird.invincible--;

    // トレイル
    bird.trail.push({ x: bird.x, y: bird.y, life: 1 });
    if (bird.trail.length > 12) bird.trail.shift();

    // パイプ更新
    for (let p of pipes) {
      p.x -= cfg.speed;
      if (!p.scored && p.x + PIPE_W < bird.x) {
        p.scored = true;
        score++;
        updateScoreUI();

        // レベルアップ判定 (スコア8ごと)
        const newLv = Math.min(10, Math.floor(score / 8) + 1);
        if (newLv > level) {
          level = newLv;
          savedLevel = newLv;
          savedScore = score;
          hp = 3; // レベルアップで全回復
          updateLevelUI();
          updateHpUI();
          // レベルアップ縦線をスポーン
          levelLines.push({ x: W + 10, lv: newLv });
          // フラッシュ
          for (let i = 0; i < 20; i++) {
            particles.push({
              x: bird.x + (Math.random() - 0.5) * 60,
              y: bird.y + (Math.random() - 0.5) * 60,
              vx: (Math.random() - 0.5) * 5,
              vy: (Math.random() - 0.5) * 5,
              life: 1, size: Math.random() * 6 + 2,
              color: `hsl(${Math.random()*360},90%,70%)`
            });
          }
        }
      }
    }
    pipes = pipes.filter(p => p.x + PIPE_W > -20);

    // レベルライン更新
    for (let ll of levelLines) {
      ll.x -= cfg.speed;
    }
    levelLines = levelLines.filter(ll => ll.x > -10);

    // パーティクル更新
    for (let p of particles) {
      p.x += p.vx; p.y += p.vy; p.life -= 0.04;
    }
    particles = particles.filter(p => p.life > 0);

    // トレイル描画
    for (let i = 0; i < bird.trail.length; i++) {
      const t = bird.trail[i];
      const alpha = (i / bird.trail.length) * 0.3;
      ctx.beginPath();
      ctx.arc(t.x, t.y, 8 * (i / bird.trail.length), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(248,160,48,${alpha})`;
      ctx.fill();
    }

    // 描画
    for (let p of pipes) drawPipe(p);
    // レベルライン描画
    for (let ll of levelLines) drawLevelLine(ll);
    drawParticles();
    drawBird();

    // 衝突
    if (checkCollision() && bird.invincible <= 0) {
      hp--;
      updateHpUI();
      // 爆発パーティクル
      for (let i = 0; i < 20; i++) {
        particles.push({
          x: bird.x, y: bird.y,
          vx: (Math.random() - 0.5) * 8,
          vy: (Math.random() - 0.5) * 8,
          life: 1, size: Math.random() * 8 + 3,
          color: `hsl(${20 + Math.random()*40},90%,60%)`
        });
      }
      if (hp <= 0) {
        // HPゼロ → ゲームオーバー
        state = 'dead';
        hiScore = Math.max(hiScore, score);
        setTimeout(() => showOverlay('dead'), 600);
      } else {
        // HP残り → savedLevelに戻して復活
        level = savedLevel;
        score = savedScore;
        updateScoreUI();
        updateLevelUI();
        pipes = [];
        pipeTimer = 0;
        bird.y = H / 2;
        bird.vy = 0;
        bird.trail = [];
        bird.invincible = 120; // 2秒無敵
        isHolding = false;
      }
    }

  } else {
    // idle / dead: 静止描画
    for (let p of pipes) drawPipe(p);
    if (levelLines) for (let ll of levelLines) drawLevelLine(ll);
    drawParticles();
    for (let p of particles) { p.x += p.vx; p.y += p.vy; p.life -= 0.025; }
    particles = particles ? particles.filter(p => p.life > 0) : [];
    if (bird) drawBird();
  }

  requestAnimationFrame(gameLoop);
}

// ── イベント ──
function startGame() {
  initGame();
  state = 'playing';
  isHolding = false;
  updateHpUI();
  document.getElementById('overlay').classList.add('hidden');
}

document.getElementById('tapBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  startGame();
});

document.getElementById('tapBtn').addEventListener('touchend', (e) => {
  e.preventDefault();
  e.stopPropagation();
  startGame();
}, { passive: false });

// マウス操作 (PC)
document.getElementById('gameWrapper').addEventListener('mousedown', (e) => {
  if (state === 'playing') startHold();
});
document.addEventListener('mouseup', () => stopHold());

// タッチ操作 (スマホ) - 押し続けで上昇、離すと落下
document.getElementById('gameWrapper').addEventListener('touchstart', (e) => {
  if (state === 'playing') {
    e.preventDefault();
    startHold();
  }
}, { passive: false });

document.getElementById('gameWrapper').addEventListener('touchend', (e) => {
  stopHold();
}, { passive: false });

document.getElementById('gameWrapper').addEventListener('touchcancel', () => stopHold());

// キーボード操作
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') e.preventDefault();
  if ((e.code === 'Space' || e.code === 'ArrowUp') && state === 'playing') startHold();
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') stopHold();
});

// ── 初期化 ──
initGame();
state = 'idle';
gameLoop();
</script>
