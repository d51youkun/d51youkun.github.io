name: Deploy Render Sync Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'render.yaml'
      - '.github/workflows/render-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK is not set. Enable Auto Deploy in Render or add the deploy hook URL as a GitHub secret."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
          echo "Render deploy triggered."
